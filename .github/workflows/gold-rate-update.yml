name: Daily Gold Rate Update

on:
  schedule:
    # Run every day at 9:00 AM IST (3:30 AM UTC)
    - cron: '30 3 * * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  update-gold-rates:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create .env file with secrets
        run: |
          echo "EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}" > .env
          echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> .env
          echo "EMAIL_RECIPIENT=${{ secrets.EMAIL_RECIPIENT }}" >> .env
          echo "SMTP_SERVER=smtp.gmail.com" >> .env
          echo "SMTP_PORT=587" >> .env
          echo "SCHEDULE_HOUR=9" >> .env
          echo "SCHEDULE_MINUTE=0" >> .env
          echo "METALS_API_URL=https://www.goldpriceindia.com/" >> .env
      
      - name: Run gold rate update
        run: python main.py --run-once
        env:
          PYTHONUNBUFFERED: 1
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gold-rate-logs
          path: logs/gold_rate_update.log
          retention-days: 30
      
      - name: Commit updated rates
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gold_rates.json
          git commit -m "Update gold rates - $(date)" || echo "No changes to commit"
          git push
